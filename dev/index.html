<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shopping List Card · Dev Harness</title>
    <!-- Material Design Icons font, used by the <ha-icon> stub.
         Real Home Assistant ships its own MDI bundle; this loads from a
         CDN so the harness doesn't need any local font assets. -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css"
    />
    <style>
      /* ─── HA-style theme variables ──────────────────────────────────
         The harness mimics the variables HA's frontend exposes so the
         card's tokens (rgba(var(--rgb-primary-text-color), α) etc.)
         resolve correctly in both modes.
      */
      body.theme-dark {
        color-scheme: dark;
        --primary-color: #03a9f4;
        --primary-text-color: #e1e1e1;
        --secondary-text-color: #9e9e9e;
        --disabled-text-color: #666;
        --divider-color: rgba(255, 255, 255, 0.12);
        --card-background-color: #1f1f1f;
        --ha-card-background: #1f1f1f;
        --error-color: #ef5350;
        --text-primary-color: #ffffff;
        --rgb-primary-text-color: 225, 225, 225;
        --rgb-primary-color: 3, 169, 244;
        --rgb-error-color: 239, 83, 80;
        --mdc-theme-secondary: #03a9f4;

        /* Harness chrome */
        --page-bg: #111;
        --panel-bg: #1a1a1a;
        --panel-border: #2a2a2a;
        --stage-bg: linear-gradient(180deg, #181818, #111);
        --pre-bg: #0d0d0d;
        --pre-fg: #c0c0c0;
        --code-chip-bg: #2a2a2a;
        --button-bg: #2a2a2a;
        --button-bg-hover: #333;
        --button-border: #383838;
        --editor-bg: #131313;
        --editor-border: #333;
      }

      body.theme-light {
        color-scheme: light;
        --primary-color: #03a9f4;
        --primary-text-color: #212121;
        --secondary-text-color: #727272;
        --disabled-text-color: #bdbdbd;
        --divider-color: rgba(0, 0, 0, 0.12);
        --card-background-color: #ffffff;
        --ha-card-background: #ffffff;
        --error-color: #db4437;
        --text-primary-color: #ffffff;
        --rgb-primary-text-color: 33, 33, 33;
        --rgb-primary-color: 3, 169, 244;
        --rgb-error-color: 219, 68, 55;
        --mdc-theme-secondary: #03a9f4;

        /* Harness chrome */
        --page-bg: #f4f5f7;
        --panel-bg: #ffffff;
        --panel-border: #e2e4e8;
        --stage-bg: linear-gradient(180deg, #ffffff, #ebedf0);
        --pre-bg: #f7f8fa;
        --pre-fg: #404040;
        --code-chip-bg: #eef0f3;
        --button-bg: #eef0f3;
        --button-bg-hover: #dde0e6;
        --button-border: #d4d8df;
        --editor-bg: #fafbfc;
        --editor-border: #d4d8df;
      }

      html,
      body {
        margin: 0;
        background: var(--page-bg);
        color: var(--primary-text-color);
        font:
          14px/1.45 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        height: 100%;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        background: var(--panel-bg);
        border-bottom: 1px solid var(--panel-border);
      }
      .topbar h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .topbar h1 .badge {
        margin-left: 6px;
        padding: 2px 8px;
        font-size: 10px;
        background: var(--code-chip-bg);
        color: var(--secondary-text-color);
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .topbar-controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      /* Shared pill-toggle styling for theme + device switchers. */
      .pill-toggle {
        display: inline-flex;
        gap: 0;
        background: var(--button-bg);
        border: 1px solid var(--button-border);
        border-radius: 999px;
        overflow: hidden;
      }
      .pill-toggle button {
        background: transparent;
        border: none;
        color: var(--primary-text-color);
        padding: 6px 14px;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
      }
      .pill-toggle button.active {
        background: var(--primary-color);
        color: white;
      }

      .layout {
        display: grid;
        grid-template-columns: 280px 1fr 380px;
        gap: 16px;
        padding: 16px;
        min-height: calc(100vh - 53px);
        box-sizing: border-box;
      }
      .panel {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 14px;
        overflow: auto;
        min-height: 0;
      }
      .panel h2 {
        margin: 0 0 10px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--secondary-text-color);
      }
      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 24px;
        background: var(--stage-bg);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        position: relative;
        min-height: 0;
        overflow: hidden;
        height: 100%;
      }
      .stage > shopping-list-card {
        width: 100%;
        max-width: 420px;
        min-height: 0;
        flex: 1 1 auto;
        transition:
          width 200ms ease,
          max-width 200ms ease;
      }
      /* Mobile preview: clamp to phone width and add a faint device-frame
         shadow so it's visually obvious you're in mobile mode. The card's
         own @media (hover: none) rule can't be triggered from JS, so we
         inject a small style sheet into the card's shadow root from
         dev/index.html — see applyDeviceMode(). */
      .stage.mobile-mode > shopping-list-card {
        width: 390px;
        max-width: 390px;
        box-shadow:
          0 0 0 6px var(--panel-bg),
          0 0 0 8px var(--button-border),
          0 18px 40px rgba(0, 0, 0, 0.35);
        border-radius: 22px;
      }
      .stage.mobile-mode::before {
        content: "Mobile preview · 390px · touch (always-visible actions)";
        position: absolute;
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: var(--secondary-text-color);
        background: var(--panel-bg);
        padding: 2px 10px;
        border-radius: 999px;
        border: 1px solid var(--panel-border);
        white-space: nowrap;
      }
      button.preset {
        display: block;
        width: 100%;
        margin: 4px 0;
        padding: 8px 10px;
        background: var(--button-bg);
        color: var(--primary-text-color);
        border: 1px solid var(--button-border);
        border-radius: 6px;
        cursor: pointer;
        text-align: left;
      }
      button.preset:hover {
        background: var(--button-bg-hover);
      }
      button.preset.active {
        background: rgba(var(--rgb-primary-color), 0.18);
        border-color: var(--primary-color);
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .row button {
        flex: 1;
        padding: 6px 10px;
        background: var(--button-bg);
        color: var(--primary-text-color);
        border: 1px solid var(--button-border);
        border-radius: 6px;
        cursor: pointer;
      }
      .row button:hover {
        background: var(--button-bg-hover);
      }
      pre.config {
        background: var(--pre-bg);
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        padding: 10px;
        font:
          12px/1.4 ui-monospace,
          monospace;
        color: var(--pre-fg);
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 240px;
        overflow: auto;
      }
      .editor-host {
        background: var(--editor-bg);
        border: 1px dashed var(--editor-border);
        border-radius: 6px;
        padding: 10px;
        margin-top: 6px;
      }
      .footer-note {
        margin-top: 12px;
        font-size: 12px;
        color: var(--secondary-text-color);
        line-height: 1.5;
      }
      .footer-note code {
        background: var(--code-chip-bg);
        padding: 1px 5px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body class="theme-dark">
    <header class="topbar">
      <h1>Shopping List Card <span class="badge">Dev Harness</span></h1>
      <div class="topbar-controls">
        <div class="pill-toggle" id="device-toggle">
          <button data-device="desktop" class="active">Desktop</button>
          <button data-device="mobile">Mobile</button>
        </div>
        <div class="pill-toggle" id="theme-toggle">
          <button data-theme="dark" class="active">Dark</button>
          <button data-theme="light">Light</button>
        </div>
      </div>
    </header>

    <div class="layout">
      <!-- Left: presets + actions ---------------------------------- -->
      <aside class="panel">
        <h2>Config presets</h2>
        <div id="presets"></div>

        <h2 style="margin-top: 18px">Mock data</h2>
        <div class="row">
          <button id="reset">Reset items</button>
          <button id="clear">Clear all</button>
        </div>
        <div class="row">
          <button id="seed">Seed 20 items</button>
          <button id="seed-quantities">Seed quantities</button>
        </div>
        <div class="row">
          <button id="seed-categories">Seed categories</button>
        </div>

        <h2 style="margin-top: 18px">Connection</h2>
        <div class="row">
          <button id="go-online">Go Online</button>
          <button id="go-offline">Go Offline</button>
        </div>

        <div class="footer-note">
          This harness mocks <code>hass</code> in-memory. Reload to reset everything. The
          <code>ha-*</code> stubs are minimal — use real HA for visual fidelity.
        </div>
      </aside>

      <!-- Center: live card --------------------------------------- -->
      <section class="panel stage" id="stage">
        <!-- shopping-list-card injected here -->
      </section>

      <!-- Right: editor + config view ----------------------------- -->
      <aside class="panel">
        <h2>Visual editor (stubbed)</h2>
        <div class="editor-host" id="editor-host"></div>

        <h2 style="margin-top: 18px">Effective config (YAML-ish)</h2>
        <pre class="config" id="config-view"></pre>
      </aside>
    </div>

    <!-- HA element stubs MUST load before the card -->
    <script type="module" src="./ha-stubs.js"></script>

    <script type="module">
      import { createMockHass } from "./mock-hass.js";
      import "../src/shopping-list-card.ts";

      const PRESETS = {
        Default: {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Shopping List",
          icon: "mdi:cart",
          show_header: true,
          completed: "bottom",
          show_add_input: true,
          add_button_label: "Add",
          empty_message: "Nothing on the list",
          sort: "manual",
        },
        "No header": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          show_header: false,
        },
        "Completed: inline + alpha sort": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "All items",
          icon: "mdi:cart",
          completed: "inline",
          sort: "alpha",
        },
        "Completed: collapsed section": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Groceries",
          icon: "mdi:basket",
          completed: "collapse",
        },
        "Completed: hidden": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "To buy",
          icon: "mdi:cart",
          completed: "hide",
        },
        "Add bar at top": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Quick add",
          icon: "mdi:cart",
          add_input_position: "top",
          completed: "collapse",
        },
        "Read-only (no add input)": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Groceries",
          show_add_input: false,
        },
        "Edit only (no remove)": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Groceries",
          icon: "mdi:cart",
          enable_remove: false,
        },
        "View only (no edit, no remove)": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Read-only list",
          icon: "mdi:cart",
          enable_edit: false,
          enable_remove: false,
        },
        "Strict checkbox (no row click)": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Strict",
          icon: "mdi:cart",
          click_to_check: false,
        },
        "Quantities enabled": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Groceries",
          icon: "mdi:cart",
          enable_quantity: true,
          quantity_max: 99,
        },
        "Quantities (max 5)": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Limited",
          icon: "mdi:cart",
          enable_quantity: true,
          quantity_max: 5,
        },
        "Categories: grouped": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Groceries",
          icon: "mdi:cart",
          enable_categories: true,
          enable_quantity: true,
          quantity_max: 99,
        },
        "Categories: grouped + colors": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Groceries",
          icon: "mdi:cart",
          enable_categories: true,
          enable_quantity: true,
          quantity_max: 99,
          category_colors: {
            Veggies: "seagreen",
            Dairy: "#9c27b0",
            Frozen: "#1976d2",
            Bakery: "#c2410c",
          },
        },
        "Categories: flat with prefix": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Groceries",
          icon: "mdi:cart",
          enable_categories: true,
          group_by_category: false,
          sort: "alpha",
          category_colors: {
            Veggies: "seagreen",
            Dairy: "#9c27b0",
          },
        },
        "Categories: no collapse, no check-all": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Plain groups",
          icon: "mdi:cart",
          enable_categories: true,
          category_collapsible: false,
          category_check_all: false,
        },
        "Custom CSS (theme-aware)": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Themed",
          icon: "mdi:basket",
          style: `
.sl-card {
  --shopping-list-radius: 24px;
  --shopping-list-inner-radius: 18px;
  --shopping-list-accent: #ff6f91;
  border: 1px solid rgba(var(--rgb-primary-text-color), 0.08);
}
          `.trim(),
        },
        "Legacy show_completed: true": {
          type: "custom:shopping-list-card",
          entity: "todo.shopping_list",
          title: "Legacy config",
          icon: "mdi:cart",
          show_completed: true,
        },
        "No entity selected": {
          type: "custom:shopping-list-card",
        },
      };

      const STARTER_ITEMS = [
        { uid: "1", summary: "Bananas", status: "needs_action" },
        { uid: "2", summary: "Olive oil", status: "needs_action" },
        { uid: "3", summary: "Bread", status: "needs_action" },
        { uid: "4", summary: "Coffee beans", status: "completed" },
      ];

      const stage = document.getElementById("stage");
      const presetsEl = document.getElementById("presets");
      const configView = document.getElementById("config-view");
      const editorHost = document.getElementById("editor-host");
      const themeToggle = document.getElementById("theme-toggle");
      const deviceToggle = document.getElementById("device-toggle");

      let mock = createMockHass({ initialItems: STARTER_ITEMS });
      let card = null;
      let editor = null;
      let activeConfig = PRESETS.Default;
      let activePresetName = "Default";
      let deviceMode = "desktop"; // "desktop" | "mobile"

      // CSS injected into the card's shadow root in mobile mode. Mirrors
      // the card's own `@media (hover: none)` rule, which can't be
      // triggered from JS without changing the actual viewport hover
      // capability. Update this if more mobile-specific rules are added
      // to src/styles.ts.
      const MOBILE_OVERRIDE_CSS = `
        /* dev harness: simulates @media (hover: none) for mobile preview */
        .sl-actions { opacity: 1 !important; }
      `.trim();
      const MOBILE_STYLE_ID = "harness-mobile-style";

      function yamlish(obj) {
        return Object.entries(obj)
          .map(([k, v]) => {
            if (typeof v === "string" && v.includes("\n")) {
              const indented = v
                .split("\n")
                .map((l) => "  " + l)
                .join("\n");
              return `${k}: |\n${indented}`;
            }
            return `${k}: ${JSON.stringify(v)}`;
          })
          .join("\n");
      }

      function mountCard(config) {
        activeConfig = config;
        configView.textContent = yamlish(config);

        if (card) card.remove();
        card = document.createElement("shopping-list-card");
        card.hass = mock.hass;
        card.setConfig(config);
        stage.appendChild(card);

        // Re-apply the device-mode style overrides into the new card's
        // shadow root once Lit has finished its first render.
        const apply = () => applyDeviceMode();
        if (card.updateComplete && typeof card.updateComplete.then === "function") {
          card.updateComplete.then(apply);
        } else {
          queueMicrotask(apply);
        }

        editorHost.innerHTML = "";
        editor = document.createElement("shopping-list-card-editor");
        editor.hass = mock.hass;
        editor.setConfig(config);
        editor.addEventListener("config-changed", (ev) => {
          const next = ev.detail.config;
          activeConfig = next;
          configView.textContent = yamlish(next);
          if (card) {
            card.setConfig(next);
            card.requestUpdate?.();
          }
        });
        editorHost.appendChild(editor);
      }

      function renderPresetButtons() {
        presetsEl.innerHTML = "";
        for (const name of Object.keys(PRESETS)) {
          const btn = document.createElement("button");
          btn.className = "preset" + (name === activePresetName ? " active" : "");
          btn.textContent = name;
          btn.addEventListener("click", () => {
            activePresetName = name;
            renderPresetButtons();
            mountCard(structuredClone(PRESETS[name]));
          });
          presetsEl.appendChild(btn);
        }
      }

      function setTheme(theme) {
        document.body.classList.remove("theme-dark", "theme-light");
        document.body.classList.add(`theme-${theme}`);
        themeToggle.querySelectorAll("button").forEach((b) => {
          b.classList.toggle("active", b.dataset.theme === theme);
        });
      }
      themeToggle.addEventListener("click", (ev) => {
        const t = ev.target.closest("button[data-theme]");
        if (t) setTheme(t.dataset.theme);
      });

      // ─── Device mode ────────────────────────────────────────────────
      // Mobile mode does two things:
      //   1. Narrows the stage / clamps the card to phone width
      //   2. Injects a small <style> into the card's shadow root that
      //      mirrors the card's `@media (hover: none)` rule, since real
      //      hover capability can't be toggled from JS.
      function applyDeviceMode() {
        const isMobile = deviceMode === "mobile";
        stage.classList.toggle("mobile-mode", isMobile);
        deviceToggle.querySelectorAll("button").forEach((b) => {
          b.classList.toggle("active", b.dataset.device === deviceMode);
        });

        const root = card?.shadowRoot;
        if (!root) return;
        let style = root.querySelector(`#${MOBILE_STYLE_ID}`);
        if (isMobile) {
          if (!style) {
            style = document.createElement("style");
            style.id = MOBILE_STYLE_ID;
            style.textContent = MOBILE_OVERRIDE_CSS;
            root.appendChild(style);
          }
        } else if (style) {
          style.remove();
        }
      }
      deviceToggle.addEventListener("click", (ev) => {
        const t = ev.target.closest("button[data-device]");
        if (!t) return;
        deviceMode = t.dataset.device;
        applyDeviceMode();
      });

      document.getElementById("reset").addEventListener("click", () => {
        mock = createMockHass({ initialItems: STARTER_ITEMS });
        mountCard(structuredClone(activeConfig));
      });
      document.getElementById("clear").addEventListener("click", () => {
        mock = createMockHass({ initialItems: [] });
        mountCard(structuredClone(activeConfig));
      });
      document.getElementById("seed").addEventListener("click", () => {
        const items = Array.from({ length: 20 }, (_, i) => ({
          uid: String(100 + i),
          summary: `Item ${i + 1}`,
          status: i % 5 === 0 ? "completed" : "needs_action",
        }));
        mock = createMockHass({ initialItems: items });
        mountCard(structuredClone(activeConfig));
      });
      // Loads items pre-tagged with `<quantity: N>` markers so the
      // quantity preset / feature can be demoed end-to-end without
      // editing each item to add a quantity.
      document.getElementById("seed-quantities").addEventListener("click", () => {
        const items = [
          { uid: "q1", summary: "Bananas <quantity: 6>", status: "needs_action" },
          { uid: "q2", summary: "Olive oil", status: "needs_action" },
          { uid: "q3", summary: "Bread <quantity: 2>", status: "needs_action" },
          { uid: "q4", summary: "Apples <quantity: 12>", status: "needs_action" },
          { uid: "q5", summary: "Coffee beans <quantity: 1>", status: "completed" },
          { uid: "q6", summary: "Sparkling water <quantity: 4>", status: "completed" },
        ];
        mock = createMockHass({ initialItems: items });
        mountCard(structuredClone(activeConfig));
      });
      // Items pre-tagged with `[Category]` prefixes (and a few quantities)
      // so the categories preset can be exercised end-to-end. Includes
      // mixed completed states + a few uncategorized "General" items.
      document.getElementById("seed-categories").addEventListener("click", () => {
        const items = [
          { uid: "c1", summary: "[Veggies] Lettuce", status: "needs_action" },
          {
            uid: "c2",
            summary: "[Veggies] Tomatoes <quantity: 4>",
            status: "needs_action",
          },
          { uid: "c3", summary: "[Veggies] Eggplant", status: "completed" },
          { uid: "c4", summary: "[Dairy] Milk <quantity: 2>", status: "needs_action" },
          { uid: "c5", summary: "[Dairy] Cheese", status: "completed" },
          { uid: "c6", summary: "[Bakery] Sourdough", status: "needs_action" },
          { uid: "c7", summary: "[Frozen] Peas <quantity: 3>", status: "needs_action" },
          { uid: "c8", summary: "Bread", status: "needs_action" },
          { uid: "c9", summary: "Toilet paper", status: "completed" },
        ];
        mock = createMockHass({ initialItems: items });
        mountCard(structuredClone(activeConfig));
      });

      document.getElementById("go-online").addEventListener("click", () => {
        mock.setState("online");
        mock.hass.connection._connected = true;
        mock.hass.connection._eventTarget.dispatchEvent(new Event("ready"));
      });
      document.getElementById("go-offline").addEventListener("click", () => {
        mock.setState("offline");
        mock.hass.connection._connected = false;
        mock.hass.connection._eventTarget.dispatchEvent(new Event("disconnected"));
      });

      renderPresetButtons();
      mountCard(structuredClone(PRESETS.Default));
    </script>
  </body>
</html>
